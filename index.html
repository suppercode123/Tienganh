<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>English Journey</title>
<meta name="theme-color" content="#131F24">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Journey">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23131F24' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='55'>🚀</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow-x:hidden;font-family:'Nunito',sans-serif;font-size:16px;background:#131F24}
body{overscroll-behavior:none;color:#fff}
.S{display:none;min-height:100vh;flex-direction:column}.S.on{display:flex}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none}
.T:active{transform:scale(.95);transition:transform .1s}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(90vh) rotate(700deg)}}
@keyframes gl{0%,100%{box-shadow:0 0 8px rgba(28,176,246,.4)}50%{box-shadow:0 0 20px rgba(28,176,246,.7)}}
@keyframes si{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cp{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes sk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes tp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes rpulse{0%{box-shadow:0 0 0 0 rgba(255,75,75,.5)}70%{box-shadow:0 0 0 15px rgba(255,75,75,0)}100%{box-shadow:0 0 0 0 rgba(255,75,75,0)}}
.as{animation:su .4s ease-out both}.ab{animation:bn 2s infinite}.ap{animation:pl 1.5s infinite}
.pbar{display:flex;align-items:center;gap:12px;padding:12px 16px}
.pbar-x{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#566570}
.pbar-track{flex:1;height:14px;background:#37464F;border-radius:8px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#FFC800,#FF9600);border-radius:8px;transition:width .5s}
.combo{text-align:center;font-size:15px;font-weight:900;color:#FFC800;animation:cp .3s ease-out;margin-bottom:-4px}
.char-area{display:flex;align-items:center;gap:12px;padding:16px 20px;justify-content:center}
.char-img{font-size:72px;position:relative;line-height:1;min-width:88px}
.char-shadow{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:50px;height:10px;background:rgba(0,0,0,.3);border-radius:50%;filter:blur(4px)}
.speech-bub{background:#1B2B34;border:2px solid #37464F;border-radius:16px;padding:12px 18px;position:relative;max-width:200px}
.speech-bub::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#37464F}
.speech-bub .aud{display:inline-flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:#1CB0F6;cursor:pointer}
.speech-bub .aud-icon{width:28px;height:28px;background:#1CB0F6;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.opts-list{display:flex;flex-direction:column;gap:10px;padding:0 16px}
.opt-fw{width:100%;padding:16px 20px;border-radius:14px;font-size:18px;font-weight:700;text-align:center;background:#1B2B34;border:2px solid #37464F;color:#E5E5E5;transition:all .15s}
.opt-fw.selected{border-color:#1CB0F6;background:#1B3644;color:#1CB0F6}
.opt-fw.correct{border-color:#58CC02;background:#1B3424;color:#58CC02}
.opt-fw.wrong{border-color:#FF4B4B;background:#3B1B1B;color:#FF4B4B;animation:sk .4s}
.rp{position:fixed;bottom:0;left:0;right:0;padding:20px 16px;z-index:50;animation:si .3s ease-out}
.rp.ok{background:#1B3424;border-top:2px solid #58CC02}
.rp.no{background:#3B1B1B;border-top:2px solid #FF4B4B}
.rp-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rp-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}
.rp-icon.ok{background:#58CC02;color:#fff}.rp-icon.no{background:#FF4B4B;color:#fff}
.rp-text{font-size:20px;font-weight:900}
.rp-text.ok{color:#58CC02}.rp-text.no{color:#FF4B4B}
.rp-sub{font-size:14px;color:#ABB5BA;margin-bottom:10px}
.btn-ct{width:100%;padding:16px;border-radius:14px;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.btn-ct.ok{background:#58CC02;color:#fff}.btn-ct.no{background:#FF4B4B;color:#fff}
.btn-chk{width:calc(100% - 32px);margin:0 16px;padding:16px;border-radius:14px;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px;background:#58CC02;color:#fff;position:fixed;bottom:20px;left:0;z-index:40}
.btn-chk.dis{background:#37464F;color:#566570;pointer-events:none}

/* REPEAT READ SECTION */
.repeat-sec{background:#1B2B34;border:1px solid #37464F;border-radius:14px;padding:14px;margin:8px 0;text-align:center}
.repeat-word{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
.repeat-ph{font-size:14px;color:#1CB0F6;margin-bottom:10px}
.mic-sm{width:56px;height:56px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:4px}
.mic-sm.off{background:#FF4B4B;animation:rpulse 1.5s infinite}
.mic-sm.on{background:#FF4B4B;animation:pl .8s infinite}
.mic-sm.pass{background:#58CC02}
.repeat-status{font-size:13px;color:#566570;margin-top:6px}
.repeat-ok{font-size:15px;font-weight:800;color:#58CC02;margin-top:6px}
.repeat-fail{font-size:13px;color:#FF9600;margin-top:6px}

.wb-placed{min-height:52px;border-bottom:2px solid #37464F;margin:0 16px 8px;padding:8px 0;display:flex;flex-wrap:wrap;gap:8px}
.wb-placed2{min-height:52px;border-bottom:2px solid #37464F;margin:0 16px 16px;padding:8px 0}
.wb-bank{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;justify-content:center;margin-bottom:100px}
.wb-word{padding:10px 16px;border-radius:12px;font-size:16px;font-weight:700;background:#1B2B34;border:2px solid #37464F;color:#E5E5E5}
.wb-word.placed{background:#37464F;color:#58CC02;border-color:#58CC02}
.chat{display:flex;flex-direction:column;gap:10px;padding:12px;overflow-y:auto;flex:1}
.bub{display:flex;align-items:flex-start;gap:10px;animation:tp .4s ease-out both}
.bub-av{flex-shrink:0;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#fcd34d,#f97316);display:flex;align-items:center;justify-content:center;font-size:18px}
.bub-box{max-width:82%;background:#1B2B34;border:1px solid #37464F;border-radius:0 16px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.6;color:#CDD4DA}
.bub-name{font-size:10px;font-weight:800;color:#FFC800;margin-bottom:2px}
.bub-hl{background:rgba(88,204,2,.15);border:1px solid #58CC02;border-radius:10px;padding:8px 12px;margin:8px 0;font-weight:800;color:#58CC02;text-align:center;font-size:17px}
.bub-img{width:100%;border-radius:12px;margin:8px 0;max-height:130px;object-fit:cover}
.listen-inline{display:inline-flex;align-items:center;gap:6px;background:#1CB0F6;color:#fff;padding:8px 16px;border-radius:12px;font-size:14px;font-weight:700;margin:6px 0}
.colan-speak{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#FF9600,#FFC800);color:#131F24;padding:7px 14px;border-radius:12px;font-size:13px;font-weight:800;margin:6px 4px 6px 0}
.speak-both{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#CE82FF,#A855F7);color:#fff;padding:7px 14px;border-radius:12px;font-size:13px;font-weight:800;margin:6px 0}
#mapS{background:linear-gradient(180deg,#131F24,#1B2B34,#131F24);padding-bottom:40px}
.resume{background:linear-gradient(90deg,#FFC800,#FF9600);border-radius:16px;padding:14px 16px;margin:0 20px 16px;display:flex;align-items:center;gap:12px}
.resume-t{font-size:14px;font-weight:700;color:#131F24;flex:1}.resume-b{background:#131F24;color:#FFC800;font-weight:800;font-size:13px;padding:8px 16px;border-radius:12px}
.mic-btn{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:8px}
.mic-btn.off{background:#FF4B4B;box-shadow:0 4px 20px rgba(255,75,75,.4)}
.mic-btn.on{background:#FF4B4B;animation:pl 1s infinite}
#splash{background:linear-gradient(180deg,#131F24,#1B2B34);align-items:center;justify-content:center;text-align:center;padding:24px}
.acard{background:#1B2B34;border:1px solid #37464F;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.acard-i{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.cfx{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cfp{position:absolute;border-radius:50%;animation:cf ease-out forwards}
.bsp{height:100px}
.voice-sel{position:fixed;top:0;right:0;z-index:100;padding:4px}
.voice-btn{background:#1B2B34;border:1px solid #37464F;color:#ABB5BA;font-size:11px;padding:4px 8px;border-radius:8px;font-family:Nunito,sans-serif}
.voice-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.voice-list{background:#1B2B34;border:1px solid #37464F;border-radius:16px;padding:16px;width:100%;max-width:340px;max-height:70vh;overflow-y:auto}
.voice-item{padding:12px;border-radius:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:2px solid #37464F}
.voice-item.active{border-color:#FFC800;background:rgba(255,200,0,.08)}
.voice-item:active{transform:scale(.98)}
.av-img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.bub-av img,.colan-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
/* PWA Install Banner */
.install-bar{background:linear-gradient(90deg,#1CB0F6,#1899D6);border-radius:14px;padding:12px 16px;margin:0 20px 12px;display:flex;align-items:center;gap:10px}
.install-bar p{flex:1;font-size:13px;font-weight:700;color:#fff}
.install-bar button{background:#fff;color:#1CB0F6;font-weight:800;font-size:12px;padding:8px 14px;border-radius:10px;white-space:nowrap}
.install-bar .close{background:none;color:rgba(255,255,255,.7);font-size:18px;padding:4px 8px}
</style>
</head>

vocabTips:["Nào các em, mở sách ra nha! Từ đầu tiên cô dạy hôm nay là <b>Teacher</b> — nghĩa là Giáo viên, giống cô nè! 😄 Các em đọc theo cô: /Ti-chờ/. Ai đọc to cô nghe nào!","Từ thứ hai nè, <b>Student</b> — Học sinh, là các em đó! 😊 Đọc theo cô nha: /Xtiu-đần/. Nhớ chưa? Student là học sinh!","Tiếp theo nha các em! <b>Happy</b> — nghĩa là Vui vẻ. Khi nào vui các em nói Happy nhé! 😄 Đọc: /Hép-pi/. Cả lớp đọc lại đi!","Từ thứ tư rồi nè! <b>Book</b> — Quyển sách. Ngắn gọn lắm, chỉ có 4 chữ cái thôi! Đọc: /Bụk/. Dễ không các em?","Từ cuối cùng rồi nè! <b>Friend</b> — Bạn bè. Cô và các em là friends nè! 🤝 Đọc: /Phren-đ/. Giỏi lắm, vỗ tay cho mình nào!"],
grammarTips:["Các em chú ý nha! Bây giờ cô dạy phần RẤT QUAN TRỌNG! Trong tiếng Việt mình chỉ có một chữ <b>\"là\"</b>, nhưng tiếng Anh có tới <b>3 chữ: am, is, are</b>! Nghe khó nhưng cô có mẹo cực dễ nhớ!","Cả lớp nhìn lên bảng nha! Cô ghi mẹo đây! 🧠",'<div class="bub-hl">I → AM</div>Mẹo nhớ nè các em: <b>"Tôi yêu em"</b> → chữ <b>\"em\"</b> nghe giống <b>\"am\"</b> phải không? Vậy nhớ luôn: <b>I</b> luôn đi với <b>am</b>! 💡<br><br>Ví dụ: <i>I am a student</i> = Tôi là học sinh','<div class="bub-hl">He / She / It → IS</div>Khi nói về <b>MỘT người</b> hoặc <b>MỘT vật</b> thì dùng <b>is</b> nha các em! 👆 Nhớ: \"Một mình thì is\"!<br><br>Ví dụ: <i>She is a teacher</i> = Cô ấy là giáo viên','<div class="bub-hl">You / We / They → ARE</div>Còn khi nói <b>\"Bạn\"</b> hoặc <b>\"nhiều người\"</b> thì dùng <b>are</b> nha! 👥 Nhớ: \"Đông đúc thì are\"!<br><br>Ví dụ: <i>We are friends</i> = Chúng ta là bạn bè',"Cả lớp nhìn lên tóm tắt nè:<br>🔵 <b>I → am</b> (Tôi yêu \"em\")<br>🟢 <b>He/She/It → is</b> (Một mình)<br>🟣 <b>You/We/They → are</b> (Đông đúc)<br><br>Ai nhớ được giơ tay cô xem nào! 🙋","Giỏi lắm các em! Học lý thuyết xong rồi! Bây giờ cô <b>phát bài tập</b> cho cả lớp làm nha. Ai làm đúng hết cô cho điểm 10! 💪"],

vocabTips:["Các em ơi, bài hôm nay cô dạy mấy từ chào hỏi cơ bản nha! Đầu tiên là <b>Hello</b> — Xin chào! 👋 Đọc là /Hê-lâu/. Nếu thân thì nói <b>Hi</b> cho ngắn gọn! Bấm nghe rồi đọc theo cô nha!","Từ thứ hai: <b>Goodbye</b> — Tạm biệt đó các em! 👋 Đọc là /Gút-bai/. Nói nhanh thì chỉ cần <b>Bye</b> là được rồi!","Từ này quan trọng lắm nha: <b>Thank you</b> — Cảm ơn! 🙏 Đọc là /Thenk-kiu/. Ai giúp mình cái gì là nói ngay Thank you, lịch sự lắm!","Tiếp nè: <b>Sorry</b> — Xin lỗi 😔 Đọc là /So-ri/. Va chạm ai, làm sai gì, nói Sorry liền nha các em!","Từ cuối: <b>Please</b> — Vui lòng 🙏 Đọc là /Pli-z/. Thêm Please vào cuối câu nào cũng lịch sự hơn gấp 10 lần!"],
grammarTips:["Các em ơi, bây giờ cô dạy <b>3 câu giao tiếp</b> mà ngày nào các em cũng sẽ dùng nha! Ai đi đâu gặp người nước ngoài cũng nói được luôn! 🗣️",'<div class="bub-hl">How are you?</div>Các em nghe nè: <b>How are you?</b> nghĩa là <b>Bạn khỏe không?</b> Đọc là /Hao a du?/.<br><br>Khi ai hỏi câu này, các em trả lời: <b>I am fine, thank you!</b> = Tôi khỏe, cảm ơn!<br><br>Cả lớp đọc theo cô nào!','<div class="bub-hl">What is your name?</div>Câu thứ hai nè: <b>What is your name?</b> = <b>Tên bạn là gì?</b> Đọc: /Uốt iz do nêm?/<br><br>Trả lời: <b>My name is Lan.</b> = Tên tôi là Lan.<br><br>Các em thay tên mình vào nhé!','<div class="bub-hl">Nice to meet you!</div>Câu cuối cùng: <b>Nice to meet you!</b> = <b>Rất vui được gặp bạn!</b> Đọc: /Nai-xờ tu mít du!/<br><br>Câu này dùng khi gặp ai lần đầu tiên nha các em!',"Cô cho các em một MẸO cực hay nè: Khi ai hỏi <b>\"How are you?\"</b>, các em KHÔNG CẦN dịch trong đầu đâu. Cứ tự động nói ngay: <b>\"I'm fine, thank you! And you?\"</b> Nói nhiều thành quen luôn! 🔁","Cô tóm lại cho cả lớp nha:<br>🔵 <b>How are you?</b> = Khỏe không?<br>🟢 <b>What is your name?</b> = Tên gì?<br>🟣 <b>Nice to meet you!</b> = Vui gặp bạn!<br><br>Ba câu này phải thuộc nằm lòng nha!","Rồi, cô đã dạy xong lý thuyết! Bây giờ cô <b>phát bài tập</b> cho các em làm. Ai làm đúng hết cô khen! 💪"],

vocabTips:["<b>Mother</b> — Mẹ. Gọi thân mật là <b>Mom</b>! 👩 /Ma-đờ/.","<b>Father</b> — Bố. Gọi thân mật là <b>Dad</b>! 👨 /Pha-đờ/.","<b>Sister</b> — Chị hoặc Em gái 👧 /Xít-tờ/.","<b>Brother</b> — Anh hoặc Em trai 👦 /Bra-đờ/.","<b>Family</b> — Gia đình. Đây là từ quan trọng nhất! 👨‍👩‍👧‍👦 /Phe-mờ-li/."],
grammarTips:["Giờ cô dạy em cách nói <b>\"của tôi\", \"của bạn\"</b> — gọi là <b>Tính từ sở hữu</b>! 🏷️","Nhưng tên hàn lâm thì kệ đi, cô chỉ dạy MẸO thôi! 😎",
'<div class="bub-hl">My = Của tôi</div>Mẹo: <b>\"My\"</b> nghe giống <b>\"Mai\"</b> (tên mình) → của <b>mình</b>! 💡<br><i>My mother = Mẹ của tôi</i>',
'<div class="bub-hl">Your = Của bạn</div>Mẹo: <b>\"Your\"</b> → <b>\"Do\"</b> bạn sở hữu! 🤝<br><i>Your father = Bố của bạn</i>',
'<div class="bub-hl">His / Her = Của anh ấy / Của cô ấy</div><b>His</b> = nam (He → His). <b>Her</b> = nữ (She → Her).<br><i>His brother = Anh trai của anh ấy</i><br><i>Her sister = Chị gái của cô ấy</i>',
"Tóm lại:<br>🔵 <b>My</b> = của tôi<br>🟢 <b>Your</b> = của bạn<br>🟡 <b>His</b> = của anh ấy<br>🟣 <b>Her</b> = của cô ấy",
"Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Left</b> — Bên trái ⬅️ /Léft/.","<b>Right</b> — Bên phải ➡️ /Rai-t/. Cũng có nghĩa là \"đúng\"!","<b>Straight</b> — Thẳng ⬆️ /Xtrết/. Go straight = Đi thẳng!","<b>Near</b> — Gần 📍 /Nia/. Near here = Gần đây.","<b>Far</b> — Xa 🏔️ /Pha/. Is it far? = Có xa không?"],
grammarTips:["Cô dạy em hỏi đường — kỹ năng SỐNG CÒN khi đi du lịch! 🗺️","Chỉ cần 2 câu thần chú! 🧠",
'<div class="bub-hl">Where is...? = ...ở đâu?</div>/Ue-rờ iz...?/<br><b>Where is the hotel?</b> = Khách sạn ở đâu?<br><b>Where is the bank?</b> = Ngân hàng ở đâu?',
'<div class="bub-hl">Go straight, turn left/right</div><b>Go straight</b> = Đi thẳng<br><b>Turn left</b> = Rẽ trái<br><b>Turn right</b> = Rẽ phải<br>Mẹo: <b>\"Turn\"</b> = Quay/Rẽ',
'<div class="bub-hl">Giới từ: in / on / at</div><b>in</b> = ở trong (in the room, in Vietnam)<br><b>on</b> = ở trên (on the table, on the street)<br><b>at</b> = ở tại (at school, at home)<br>Mẹo: <b>in</b> = trong hộp 📦, <b>on</b> = trên mặt 📱, <b>at</b> = tại điểm 📍',
"Tóm lại:<br>❓ <b>Where is...?</b> = Hỏi ở đâu<br>➡️ <b>Go straight / Turn left / Turn right</b><br>📍 <b>in / on / at</b> = trong / trên / tại","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Breakfast</b> — Bữa sáng 🍳 /Brék-phớt/. Break + fast = Phá vỡ cơn đói!","<b>Lunch</b> — Bữa trưa 🥗 /Lân-ch/.","<b>Dinner</b> — Bữa tối 🍽️ /Đi-nờ/.","<b>Delicious</b> — Ngon 😋 /Đi-lí-shớt/. Khen đồ ăn ngon = \"It is delicious!\"","<b>Menu</b> — Thực đơn 📋 /Men-niu/. Can I see the menu? = Cho xem thực đơn?"],
grammarTips:["Vào nhà hàng em nói gì? Cô dạy <b>cách gọi món lịch sự</b>! 🍽️","Chỉ cần nhớ 2 mẫu câu! 🧠",
'<div class="bub-hl">I would like... = Tôi muốn...</div>Phát âm: /Ai wút lai-k.../<br>Viết tắt: <b>I\'d like...</b><br><i>I would like some water</i> = Tôi muốn nước<br><br>Mẹo: Đây là cách lịch sự nhất để gọi món!',
'<div class="bub-hl">Can I have...? = Cho tôi... được không?</div>/Ken ai hév...?/<br><i>Can I have the menu?</i> = Cho tôi xem thực đơn?<br><i>Can I have the bill?</i> = Cho tôi tính tiền?',
'<div class="bub-hl">some / any</div><b>some</b> = một ít (câu khẳng định): <i>I have <b>some</b> water</i><br><b>any</b> = chút nào (câu hỏi/phủ định): <i>Do you have <b>any</b> rice?</i><br>Mẹo: <b>some</b> = có sẵn ✅, <b>any</b> = hỏi xem có không ❓',
"Tóm lại:<br>🍽️ <b>I would like...</b> = Tôi muốn...<br>🙋 <b>Can I have...?</b> = Cho tôi...?<br>✅ <b>some</b> (có) / <b>any</b> (hỏi)","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Always</b> — Luôn luôn 🔄 /Ol-uê-z/. 100% thời gian!","<b>Sometimes</b> — Thỉnh thoảng 🎲 /Xam-thai-mz/. Lúc có lúc không.","<b>Never</b> — Không bao giờ 🚫 /Ne-vờ/. 0% thời gian!","<b>Work</b> — Làm việc 💼 /Uơk/. I work every day = Tôi làm việc mỗi ngày.","<b>Sleep</b> — Ngủ 😴 /Xlíp/. I sleep at 10 PM = Tôi ngủ lúc 10 tối."],
grammarTips:["Giờ cô dạy em <b>Thì Hiện Tại Đơn</b> — thì em dùng NHIỀU NHẤT! 📅","Thì này dùng khi nói về <b>thói quen, lịch trình, sự thật</b>. 🧠",
'<div class="bub-hl">I/You/We/They + V nguyên</div><i>I <b>work</b> every day</i> = Tôi làm việc mỗi ngày<br><i>They <b>eat</b> rice</i> = Họ ăn cơm<br>Mẹo: Nhóm \"nhiều\" → giữ nguyên động từ!',
'<div class="bub-hl">He/She/It + V thêm s/es</div><i>He <b>works</b> every day</i> = Anh ấy làm mỗi ngày<br><i>She <b>eats</b> rice</i> = Cô ấy ăn cơm<br>Mẹo: 1 người → thêm <b>s</b>! Giống thêm \"áo choàng\" cho động từ! 🧥',
'<div class="bub-hl">Phủ định: don\'t / doesn\'t</div><i>I <b>don\'t</b> like coffee</i> = Tôi không thích cà phê<br><i>She <b>doesn\'t</b> like tea</i> = Cô ấy không thích trà<br>Mẹo: <b>don\'t</b> = \"đôn(g) thích\" 🙅',
"Trạng từ tần suất:<br>🟢 <b>always</b> (100%) > <b>usually</b> (80%) > <b>sometimes</b> (50%) > <b>never</b> (0%)<br>Đặt TRƯỚC động từ: <i>I <b>always</b> eat breakfast</i>","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Yesterday</b> — Hôm qua 📆 /Yé-xtờ-đây/.","<b>Visited</b> — Đã thăm/viếng 🏛️ /Ví-zi-tịd/. I visited Hanoi = Tôi đã thăm Hà Nội.","<b>Beautiful</b> — Đẹp 🌅 /Biu-ti-phồ/. It was beautiful! = Nó đẹp lắm!","<b>Traveled</b> — Đã đi du lịch 🧳 /Tré-vồ-đ/.","<b>Enjoyed</b> — Đã thích/thưởng thức 🎉 /En-joi-đ/. I enjoyed it! = Tôi thích lắm!"],
grammarTips:["Cô dạy em <b>Thì Quá Khứ Đơn</b> — kể chuyện đã xảy ra! ✈️","Quá khứ = thêm <b>-ed</b> vào cuối động từ. Nhưng có nhiều ngoại lệ! 🧠",
'<div class="bub-hl">V thường: thêm -ed</div><i>I <b>visited</b> Hanoi</i> = Tôi đã thăm HN<br><i>She <b>traveled</b> to Japan</i> = Cô ấy đã đi Nhật<br>Mẹo: <b>-ed</b> = \"dấu vết\" quá khứ! 🐾',
'<div class="bub-hl">V bất quy tắc (phải nhớ!)</div><b>go → went</b> (đi → đã đi)<br><b>eat → ate</b> (ăn → đã ăn)<br><b>see → saw</b> (nhìn → đã nhìn)<br><b>have → had</b> (có → đã có)<br><b>buy → bought</b> (mua → đã mua)',
'<div class="bub-hl">was / were (quá khứ của am/is/are)</div><b>I/He/She/It → was</b><br><b>You/We/They → were</b><br><i>It <b>was</b> beautiful</i> = Nó đẹp lắm<br><i>They <b>were</b> happy</i> = Họ vui lắm',
"Phủ định: <b>didn\'t + V nguyên</b><br><i>I <b>didn\'t go</b> to school</i> = Tôi không đi học<br>Câu hỏi: <b>Did + S + V nguyên?</b><br><i><b>Did</b> you <b>eat</b>?</i> = Bạn ăn chưa?","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Headache</b> — Đau đầu 🤕 /Hét-ếch/. Head (đầu) + ache (đau).","<b>Medicine</b> — Thuốc 💊 /Mé-đi-xần/.","<b>Hospital</b> — Bệnh viện 🏥 /Ho-xpí-tồ/.","<b>Exercise</b> — Tập thể dục 🏃 /Ék-xờ-xai-z/.","<b>Healthy</b> — Khỏe mạnh 💪 /Heo-đi/."],
grammarTips:["Cô dạy em <b>3 từ quyền lực</b>: can, should, must! 💪","Ba từ này đặt TRƯỚC động từ, không chia! 🧠",
'<div class="bub-hl">CAN = Có thể</div><i>I <b>can</b> swim</i> = Tôi biết bơi<br><i><b>Can</b> you help me?</i> = Bạn giúp được không?<br>Phủ định: <b>can\'t</b> = không thể',
'<div class="bub-hl">SHOULD = Nên</div><i>You <b>should</b> see a doctor</i> = Bạn nên đi bác sĩ<br><i>You <b>shouldn\'t</b> eat too much</i> = Không nên ăn nhiều<br>Mẹo: <b>Should</b> = Lời khuyên nhẹ nhàng 🤝',
'<div class="bub-hl">MUST = Phải (bắt buộc)</div><i>You <b>must</b> take medicine</i> = Bạn phải uống thuốc<br><i>You <b>must not</b> smoke</i> = Cấm hút thuốc!<br>Mẹo: <b>Must</b> = Mệnh lệnh! 🚨',
"Tóm lại:<br>🟢 <b>can</b> = có thể (khả năng)<br>🟡 <b>should</b> = nên (khuyên)<br>🔴 <b>must</b> = phải (bắt buộc)","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Tomorrow</b> — Ngày mai 📅 /Tu-mo-râu/.","<b>Plan</b> — Kế hoạch 📋 /Plen/. What is your plan? = Kế hoạch gì?","<b>Meeting</b> — Cuộc họp 🤝 /Mí-ting/. I have a meeting = Tôi có cuộc họp.","<b>Project</b> — Dự án 📊 /Pro-dzhéc-t/.","<b>Dream</b> — Ước mơ/Giấc mơ 💭 /Đri-m/."],
grammarTips:["Giờ cô dạy em nói về <b>TƯƠNG LAI</b> — chuyện SẮP XẢY RA! 🎯","Có 2 cách nói tương lai! 🧠",
'<div class="bub-hl">WILL + V = Sẽ (quyết định ngay)</div><i>I <b>will</b> help you</i> = Tôi sẽ giúp bạn<br><i><b>Will</b> you come?</i> = Bạn sẽ đến chứ?<br>Viết tắt: <b>I\'ll, he\'ll, she\'ll</b><br>Mẹo: <b>will</b> = quyết ngay tại chỗ! ⚡',
'<div class="bub-hl">BE GOING TO + V = Sắp/Định (đã lên kế hoạch)</div><i>I <b>am going to</b> travel</i> = Tôi định đi du lịch<br><i>She <b>is going to</b> study</i> = Cô ấy sắp học<br>Mẹo: <b>going to</b> = đã plan sẵn! 📋',
'<div class="bub-hl">Phân biệt Will vs Going to</div>🔵 <b>Will</b>: Quyết ngay (Trời mưa! I <b>will</b> take umbrella!)<br>🟢 <b>Going to</b>: Đã lên kế hoạch (Tối nay I <b>am going to</b> cook)<br><br>Nói đơn giản: <b>Will = Bất chợt, Going to = Đã tính trước</b>',
"Tóm lại:<br>⚡ <b>will</b> = sẽ (quyết ngay)<br>📋 <b>going to</b> = sắp/định (đã tính)<br>❌ <b>won\'t</b> = sẽ không","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Experience</b> — Kinh nghiệm 📝 /Ek-xpia-ri-ần-xờ/. I have 5 years of experience.","<b>Interview</b> — Phỏng vấn 🎤 /In-tờ-viu/.","<b>Company</b> — Công ty 🏢 /Cam-pờ-ni/.","<b>Salary</b> — Lương 💰 /Se-lờ-ri/.","<b>Already</b> — Đã rồi ✅ /Ol-ré-đi/. I have already finished = Tôi đã xong rồi."],
grammarTips:["Đây là thì KHÓ NHẤT nhưng QUAN TRỌNG NHẤT cho B2! 💼","Thì <b>Hiện Tại Hoàn Thành</b> = đã làm, kinh nghiệm, vẫn còn hiệu lực! 🧠",
'<div class="bub-hl">have/has + V3 (past participle)</div><i>I <b>have worked</b> for 5 years</i> = Tôi đã làm 5 năm<br><i>She <b>has visited</b> Japan</i> = Cô ấy đã đến Nhật (từng)<br>Mẹo: <b>have + V3</b> = \"đã\" nhưng vẫn liên quan đến hiện tại!',
'<div class="bub-hl">Dấu hiệu: already, yet, ever, never, since, for</div><b>already</b> = đã rồi: <i>I have <b>already</b> eaten</i><br><b>yet</b> = chưa (hỏi/phủ định): <i>Have you finished <b>yet</b>?</i><br><b>ever</b> = đã bao giờ: <i>Have you <b>ever</b> been to Paris?</i><br><b>for/since</b> = trong/từ khi: <i>I have lived here <b>for</b> 3 years / <b>since</b> 2020</i>',
'<div class="bub-hl">Phân biệt: Quá Khứ Đơn vs HTHT</div>🔵 Quá khứ đơn: Đã xong, thời gian rõ<br><i>I <b>visited</b> Japan <b>last year</b></i> (năm ngoái - xong rồi)<br><br>🟢 HTHT: Kinh nghiệm, không rõ khi nào<br><i>I <b>have visited</b> Japan</i> (từng đến - không nói khi nào)',
"Tóm lại:<br>✅ <b>have/has + V3</b> = đã (kinh nghiệm, vẫn hiệu lực)<br>🔑 Dấu hiệu: <b>already, yet, ever, never, for, since</b><br>⚡ Khác QKĐ: không có thời gian cụ thể","Giờ <b>LÀM BÀI</b>! 💪"],

12:{name:"So Sánh",sub:"Tính từ so sánh",lvl:"B2",icon:"⚖️",
vocab:[
{en:"bigger",vn:"Lớn hơn",ph:"Bí-gờ",ipa:"/ˈbɪɡər/",img:"https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=300&h=200&fit=crop",em:"📏"},
{en:"better",vn:"Tốt hơn",ph:"Bé-tờ",ipa:"/ˈbetər/",img:"https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=300&h=200&fit=crop",em:"👍"},
{en:"the best",vn:"Tốt nhất",ph:"Đờ bé-xt",ipa:"/ðə best/",img:"https://images.unsplash.com/photo-1553729459-afe8f2e2e2d0?w=300&h=200&fit=crop",em:"🏆"},
{en:"more",vn:"Hơn/Nhiều hơn",ph:"Mo",ipa:"/mɔːr/",img:"https://images.unsplash.com/photo-1533227268428-f9ed0900fb3b?w=300&h=200&fit=crop",em:"➕"},
{en:"than",vn:"Hơn (so với)",ph:"Đen",ipa:"/ðæn/",img:"https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=300&h=200&fit=crop",em:"↔️"}],
vocabTips:["<b>Bigger</b> — Lớn hơn 📏 /Bí-gờ/. big → bigger.","<b>Better</b> — Tốt hơn 👍 /Bé-tờ/. good → better (bất quy tắc!).","<b>The best</b> — Tốt nhất 🏆 /Đờ bé-xt/. good → better → the best.","<b>More</b> — Hơn/Nhiều hơn ➕ /Mo/. More expensive = Đắt hơn.","<b>Than</b> — Hơn (so với) ↔️ /Đen/. Bigger than = Lớn hơn..."],
grammarTips:["Cô dạy em <b>SO SÁNH</b> — kỹ năng thiết yếu để diễn đạt ý kiến! ⚖️","Có 2 loại so sánh! 🧠",
'<div class="bub-hl">Từ ngắn (1-2 âm): thêm -er / -est</div><b>So sánh hơn:</b> tall → tall<b>er</b> (cao hơn)<br><b>So sánh nhất:</b> tall → the tall<b>est</b> (cao nhất)<br><i>He is tall<b>er than</b> me</i><br><i>She is <b>the tallest</b> in class</i>',
'<div class="bub-hl">Từ dài (3+ âm): more / the most</div><b>So sánh hơn:</b> <b>more</b> expensive (đắt hơn)<br><b>So sánh nhất:</b> <b>the most</b> expensive (đắt nhất)<br><i>This is <b>more</b> expensive <b>than</b> that</i><br><i>This is <b>the most</b> expensive</i>',
'<div class="bub-hl">Bất quy tắc (phải nhớ!)</div><b>good → better → the best</b> (tốt)<br><b>bad → worse → the worst</b> (tệ)<br><b>far → farther → the farthest</b> (xa)<br>Mẹo: 3 từ này dùng CỰC NHIỀU, cứ nhớ thuộc lòng!',
"Tóm lại:<br>📏 Từ ngắn: <b>-er / -est</b><br>📐 Từ dài: <b>more / the most</b><br>⚠️ Bất quy tắc: <b>good→better→best, bad→worse→worst</b>","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Built</b> — Được xây 🏗️ /Bilt/. build → built → built.","<b>Spoken</b> — Được nói 🗣️ /Xpâu-kần/. speak → spoke → spoken.","<b>Made</b> — Được làm 🏭 /Mế-đ/. make → made → made. Made in Vietnam!","<b>Discovered</b> — Được phát hiện 🔬 /Đi-xca-vờ-đ/.","<b>Written</b> — Được viết ✍️ /Rí-tần/. write → wrote → written."],
grammarTips:["Đọc báo tiếng Anh em sẽ gặp RẤT NHIỀU <b>câu bị động</b>! 📰","Bị động = nhấn mạnh vào VIỆC, không phải NGƯỜI! 🧠",
'<div class="bub-hl">Công thức: be + V3 (past participle)</div><b>Chủ động:</b> They <b>built</b> this house in 2000<br><b>Bị động:</b> This house <b>was built</b> in 2000<br><br>Mẹo: Đổi vị trí — vật/việc lên đầu câu!',
'<div class="bub-hl">Các thì phổ biến</div><b>Hiện tại:</b> English <b>is spoken</b> worldwide (được nói)<br><b>Quá khứ:</b> It <b>was built</b> in 1990 (được xây)<br><b>Tương lai:</b> It <b>will be finished</b> tomorrow (sẽ được hoàn thành)',
'<div class="bub-hl">by + người/vật thực hiện</div><i>This book <b>was written by</b> Mark Twain</i><br>= Sách này được viết bởi Mark Twain<br><br>Mẹo: <b>by</b> = \"bởi\" — chỉ dùng khi cần nói ai làm!',
"Tóm lại:<br>📐 <b>be + V3</b> = câu bị động<br>⏰ is/was/will be + V3 (tùy thì)<br>👤 <b>by</b> = bởi (nếu cần nói ai)","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>If</b> — Nếu ❓ /If/. Từ nhỏ nhưng quyền lực!","<b>Would</b> — Sẽ (trong giả định) 💭 /Wút/. I would go = Tôi sẽ đi (nếu...).","<b>Could</b> — Có thể (giả định) 🔑 /Kút/. Quá khứ của can, dùng trong câu giả định.","<b>Possible</b> — Có thể xảy ra ✨ /Po-xi-bồ/.","<b>Impossible</b> — Không thể 🚫 /Im-po-xi-bồ/. im- = phủ định!"],
grammarTips:["<b>Câu điều kiện</b> — cấu trúc KINH ĐIỂN của B2! Đọc báo, viết email đều cần! 🔮","Có 3 loại chính! 🧠",
'<div class="bub-hl">Loại 0: Sự thật hiển nhiên</div><b>If + hiện tại, hiện tại</b><br><i>If you heat water, it <b>boils</b></i><br>= Nếu đun nước, nó sôi (luôn đúng!)<br>Mẹo: Đây là luật tự nhiên! 🌍',
'<div class="bub-hl">Loại 1: Có thể xảy ra (tương lai)</div><b>If + hiện tại, will + V</b><br><i>If it <b>rains</b>, I <b>will</b> stay home</i><br>= Nếu mưa, tôi sẽ ở nhà<br>Mẹo: Chuyện CÓ THỂ xảy ra thật! ☁️',
'<div class="bub-hl">Loại 2: Giả định (khó xảy ra)</div><b>If + quá khứ, would + V</b><br><i>If I <b>had</b> money, I <b>would</b> travel</i><br>= Nếu tôi có tiền, tôi sẽ đi du lịch<br>(nhưng hiện tại KHÔNG CÓ tiền 😅)<br>Mẹo: <b>Giá mà...</b> = If + quá khứ!',
"Tóm lại:<br>0️⃣ <b>If + HT, HT</b> = Luật tự nhiên<br>1️⃣ <b>If + HT, will + V</b> = Có thể thật<br>2️⃣ <b>If + QK, would + V</b> = Giá mà...","Giờ <b>LÀM BÀI</b>! 💪"],

vocabTips:["<b>Look up</b> — Tra (từ điển) 🔍 /Lúk ấp/. Look up a word = Tra một từ.","<b>Give up</b> — Bỏ cuộc 🏳️ /Gíp ấp/. Never give up! = Đừng bao giờ bỏ cuộc!","<b>Find out</b> — Phát hiện ra 💡 /Phai-n đao-t/. I found out the truth.","<b>Break down</b> — Hỏng/Sụp đổ 💥 /Brếch đao-n/. My car broke down.","<b>Carry on</b> — Tiếp tục ▶️ /Ke-ri on/. Carry on working = Tiếp tục làm."],
grammarTips:["Chào mừng em đến <b>level C1</b>! Đây là level <b>đọc báo + tranh luận</b>! 🎭","Phrasal verbs = Động từ + giới từ → nghĩa KHÁC HOÀN TOÀN! 🧠",
'<div class="bub-hl">Phrasal Verbs phổ biến</div><b>look up</b> = tra cứu (≠ nhìn lên)<br><b>turn on/off</b> = bật/tắt<br><b>pick up</b> = nhặt lên / đón ai<br><b>put off</b> = hoãn lại<br><b>come up with</b> = nghĩ ra ý tưởng<br>Mẹo: PHẢI HỌC TỪNG CỤM, không đoán được!',
'<div class="bub-hl">Idioms (Thành ngữ) hay gặp</div><b>Piece of cake</b> = Dễ như ăn bánh 🍰<br><b>Break a leg</b> = Chúc may mắn! 🦵<br><b>Hit the nail on the head</b> = Nói trúng vấn đề 🔨<br><b>Under the weather</b> = Không khỏe 🤒<br><b>Once in a blue moon</b> = Hiếm khi 🌙',
'<div class="bub-hl">Cách nhớ Phrasal Verbs</div>1. Học theo CHỦ ĐỀ, không học random<br>2. Đặt vào CÂU để nhớ ngữ cảnh<br>3. Mỗi ngày học 2-3 cụm, dùng ngay!<br><br>Mẹo: Viết note dán lên tường! 📝',
"C1 = hiểu idioms + phrasal verbs → giao tiếp tự nhiên như người bản xứ! 🗣️","Giờ <b>LÀM BÀI</b>! 💪"],

function repeatHTML(word,phon){

  h+='<p class="repeat-word">'+word+'</p>';

  h+='<button class="T" style="display:inline-flex;align-items:center;gap:6px;background:#1CB0F6;color:#fff;padding:6px 14px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:8px" onclick="sp(\''+word.replace(/'/g,"\\'")+'\',0.7)">🔊 Nghe mẫu</button><br>';
  if(ls.rpRec){h+='<div class="mic-sm on">🎤</div><p class="repeat-status">Đang nghe...</p>'}
  else if(ls.rp===2){h+='<div class="mic-sm pass">✓</div><p class="repeat-ok">Phát âm đạt! '+ls.rpSc+'%</p>'}
  else{
    h+='<button class="T mic-sm off" onclick="doRepeat(\''+word.replace(/'/g,"\\'")+'\')">🎤</button>';
    if(ls.rpTr)h+='<p class="repeat-fail">Em nói: "'+ls.rpTr+'" ('+ls.rpSc+'%) — Thử lại!</p>';

  }
  h+='</div>';
  return h;
}

function resPanel(ok,msg,sub,fn,repeatWord,repeatPh){

  h+='<div class="rp-label"><div class="rp-icon '+(ok?"ok":"no")+'">'+(ok?"✓":"✕")+'</div><span class="rp-text '+(ok?"ok":"no")+'">'+msg+'</span></div>';

    }else{
      h+='<p style="font-size:14px;color:#58CC02;font-weight:800;text-align:center;margin-bottom:8px">✅ Đã đọc đủ '+need+' lần! Giỏi lắm!</p>';
    }
  }

  if(canNext){h+='<button class="T btn-ct '+(ok?"ok":"no")+'" onclick="'+fn+'">Tiếp tục</button>'}

window.doRepeat=function(word){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ls.rp=2;rerender();return}
  var r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=3;
  ls.rpRec=true;ls.rpTr="";rerender();
  var timeout=setTimeout(function(){ls.rpRec=false;ls.rpTr="(Không nghe được)";ls.rpSc=0;ls.rp=1;rerender()},8000);
  r.onresult=function(e){
    clearTimeout(timeout);
    var s=e.results[0][0].transcript.toLowerCase().trim();
    var x=word.toLowerCase().trim();
    ls.rpTr=s;
    var ew=x.split(/\s+/),sw=s.split(/\s+/),m=0;
    ew.forEach(function(w){if(sw.indexOf(w)>=0)m++});
    var p=Math.round(m/ew.length*100);ls.rpSc=p;
    if(p>=40){ls.rpCount=(ls.rpCount||0)+1;if(ls.rpCount>=2)ls.rp=2;bp(1);setTimeout(function(){spVi('Lần '+(ls.rpCount)+' đạt! '+(ls.rpCount>=2?'Đủ rồi!':'Tiếp tục nha!'))},300)}else{ls.rp=1;bp(0)}
    ls.rpRec=false;sa();rerender();
  };
  r.onerror=function(){clearTimeout(timeout);ls.rpRec=false;rerender()};
  r.onend=function(){clearTimeout(timeout);if(ls.rpRec){ls.rpRec=false;rerender()}};
  r.start();
};

window.pickVoiceEN=function(i){
  var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("en")===0&&/female|samantha|zira|karen|google.*us|fiona/i.test(v.name)});

window.testVoiceVI=function(i){
  var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("vi")===0});

  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance("Xin chào các em! Cô là Lan!");
  u.lang="vi-VN";u.voice=v;u.rate=1;
  speechSynthesis.speak(u);
};

window.testVoiceEN=function(i){

};

}
